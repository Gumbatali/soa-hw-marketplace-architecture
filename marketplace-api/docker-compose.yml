services:
  # PostgreSQL для локальной разработки/демо.
  postgres:
    image: postgres:16
    container_name: marketplace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: marketplace
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: marketplace
    ports:
      # Внешний порт можно менять через POSTGRES_PORT (по умолчанию 5433).
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketplace -d marketplace"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Spring Boot API.
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marketplace-api
    restart: unless-stopped
    environment:
      # Приложение ходит в БД по имени сервиса `postgres` внутри docker-сети.
      DB_URL: jdbc:postgresql://postgres:5432/marketplace
      DB_USER: marketplace
      DB_PASSWORD: marketplace
      # Минимальный секрет для JWT (>= 32 байт).
      JWT_SECRET: "01234567890123456789012345678901"
      ORDER_RATE_LIMIT_MINUTES: 5
    ports:
      # Внешний порт API можно менять через APP_PORT (по умолчанию 8081).
      - "${APP_PORT:-8081}:8080"
    depends_on:
      postgres:
        condition: service_healthy
