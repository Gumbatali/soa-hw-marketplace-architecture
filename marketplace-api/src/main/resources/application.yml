spring:
  application:
    name: marketplace-api
  datasource:
    # Локально можно запускать без Docker через localhost:5432.
    url: ${DB_URL:jdbc:postgresql://localhost:5432/marketplace}
    username: ${DB_USER:marketplace}
    password: ${DB_PASSWORD:marketplace}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    # Миграции поднимаются автоматически при старте приложения.
    enabled: true

server:
  shutdown: graceful

app:
  auth:
    # Время жизни токенов под требования задания.
    access-token-minutes: 20
    refresh-token-days: 14
    jwt-secret: ${JWT_SECRET:01234567890123456789012345678901}
  order:
    # Ограничение частоты create/update заказа.
    rate-limit-minutes: ${ORDER_RATE_LIMIT_MINUTES:5}

logging:
  level:
    root: INFO
